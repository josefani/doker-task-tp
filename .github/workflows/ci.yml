name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  IMAGE_FRONTEND: ${{ secrets.DOCKER_USERNAME }}/docker-task-frontend
  IMAGE_BACKEND: ${{ secrets.DOCKER_USERNAME }}/docker-task-backend

jobs:

  # ─────────────────────────────
  # 1. TESTS FRONTEND
  # ─────────────────────────────
  frontend-ci:
    name: Build & Test Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install & Build
        working-directory: frontend
        run: |
          npm ci
          npm run build

  # ─────────────────────────────
  # 2. TESTS BACKEND
  # ─────────────────────────────
  backend-ci:
    name: Build & Test Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install & Test
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pytest || echo "No tests yet"

  # ─────────────────────────────
  # 3. BUILD & PUSH DOCKER IMAGES
  # ─────────────────────────────
  docker-build:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [frontend-ci, backend-ci]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.IMAGE_FRONTEND }}:latest
            ${{ env.IMAGE_FRONTEND }}:${{ github.sha }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE_BACKEND }}:latest
            ${{ env.IMAGE_BACKEND }}:${{ github.sha }}

  # ─────────────────────────────
  # 4. DEPLOY SUR KUBERNETES
  # ─────────────────────────────
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config

      - name: Update image tags dans les manifests
        run: |
          sed -i "s|IMAGE_FRONTEND|${{ env.IMAGE_FRONTEND }}:${{ github.sha }}|g" k8s/*.yaml
          sed -i "s|IMAGE_BACKEND|${{ env.IMAGE_BACKEND }}:${{ github.sha }}|g" k8s/*.yaml

      - name: Deploy sur Kubernetes
        run: |
          kubectl apply -f k8s/
          kubectl rollout status deployment/frontend
          kubectl rollout status deployment/backend